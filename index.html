<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Amy's Keychain Collection</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="lock-screen" class="view-panel">
      <div class="lock-screen-container">
        <div class="lock-box">
          <div class="lock-icon">🔒</div>
          <h2>Keychain Collection</h2>
          <p>Enter passcode to unlock</p>

          <input
            type="password"
            id="passcode-input"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="6"
            placeholder="••••"
            autocomplete="current-password"
          />

          <button id="login-btn" class="primary-btn">Unlock</button>
          <div id="error-message" class="error-message hidden">
            Incorrect passcode. Try again!
          </div>
        </div>
      </div>
    </div>

    <div id="main-app" class="hidden">
      <header class="app-header">
        <div class="header-logo">
          <h1>Amy's Keychain Collection</h1>
        </div>

        <div class="header-actions">
          <button id="nav-add-btn" class="pill-add-btn">Add</button>

          <div class="profile-dropdown">
            <button id="profile-menu-btn" class="profile-trigger">
              Amy 👤
            </button>
            <div id="profile-menu-content" class="dropdown-content hidden">
              <button id="logout-btn" class="dropdown-logout-btn">
                Sign Out 🚪
              </button>
            </div>
          </div>
        </div>
      </header>

      <div id="gallery-view" class="view-panel">
        <!-- Friends Title Dots Loading Animation -->
        <div id="loading-text" class="loading-container">
          <div class="friends-dots">
            <span class="dot dot-red"></span>
            <span class="dot dot-blue"></span>
            <span class="dot dot-red2"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-blue2"></span>
          </div>
          <p class="loading-label">Loading Amy's Collection...</p>
        </div>
        <div id="gallery-grid" class="gallery-grid"></div>
      </div>

      <div id="form-view" class="view-panel hidden">
        <div class="form-card">
          <h2>Add New Keychain</h2>

          <form id="keychain-form" onsubmit="return false;">
            <div class="form-group">
              <label for="input-name">Keychain Name</label>
              <input
                type="text"
                id="input-name"
                placeholder="e.g., Smoky Mountains Bear"
                required
              />
            </div>

            <div class="form-group">
              <label for="input-location">From</label>
              <input
                type="text"
                id="input-location"
                placeholder="e.g., Gatlinburg, TN (Optional)"
              />
            </div>

            <div class="form-group">
              <label>Date Acquired</label>
              <div class="date-toggle-group">
                <button
                  type="button"
                  id="date-mode-today"
                  class="toggle-btn active"
                >
                  Today
                </button>
                <button type="button" id="date-mode-custom" class="toggle-btn">
                  Pick Date
                </button>
                <button type="button" id="date-mode-unknown" class="toggle-btn">
                  Unknown
                </button>
              </div>

              <div
                id="custom-date-container"
                style="display: none; margin-top: 10px"
              >
                <input type="date" id="input-date" />
              </div>
            </div>

            <div class="form-group">
              <label>Photo Capture</label>
              <label for="input-file" class="custom-file-upload"
                >📸 Open Camera / Select Image (Optional)</label
              >
              <input
                type="file"
                id="input-file"
                accept="image/*"
                capture="environment"
              />
              <div id="image-preview"></div>
            </div>

            <div class="form-group">
              <label for="input-notes">Memory Notes</label>
              <textarea
                id="input-notes"
                rows="3"
                placeholder="Write a tiny story or memory about this trip... (Optional)"
              ></textarea>
            </div>

            <div class="form-buttons">
              <button type="button" id="form-cancel-btn" class="secondary-btn">
                Cancel
              </button>
              <button type="button" id="form-submit-btn" class="primary-btn">
                Save to Catalog
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="focusModal" class="focus-modal" style="display: none">
      <span class="focus-close">&times;</span>
      <div class="focus-card-content">
        <img id="focusImage" src="" alt="Focused Keychain" />
        <div class="focus-text-details">
          <h2 id="focusName"></h2>
          <p id="focusLocation"></p>
          <p id="focusDate"></p>
          <div id="focusNotes" class="focus-notes-box"></div>
          <div style="margin-top: 20px; text-align: right">
            <button id="focus-delete-btn" class="danger-link-btn">
              🗑️ Delete Entry
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
